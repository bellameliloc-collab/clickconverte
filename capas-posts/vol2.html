<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600;1,700&family=Poppins:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; background: #1d1208; }

    .cover {
      width: 1080px; height: 1350px;
      position: relative; overflow: hidden;
      background: #1d1208;
      font-family: 'Poppins', sans-serif;
    }

    /* Foto no topo, ocupa ~380px, com fade para o fundo escuro */
    .photo-strip {
      position: absolute; top: 0; left: 0; right: 0;
      height: 600px; overflow: hidden;
    }
    .photo-strip img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 45%;
    }
    /* Fade suave do fundo da foto para o bg escuro — chave do estilo vinci */
    .photo-strip::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(to bottom,
        rgba(29,18,8,0) 0%,
        rgba(29,18,8,1) 100%);
    }

    /* Bloco de texto na parte inferior */
    .text-block {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 68px 52px;
    }

    /* Número do slide */
    .slide-num {
      font-size: 11px; font-weight: 300; color: rgba(207,181,59,0.55);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Intro em Cormorant italic, suave */
    .intro-serif {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 400;
      font-size: 26px; color: rgba(244,242,235,0.58);
      margin-bottom: 4px;
    }

    /* Statement principal em Poppins bold cream */
    .main-statement {
      font-family: 'Poppins', sans-serif;
      font-weight: 700; font-size: 42px;
      line-height: 1.15; color: #f4f2eb;
      margin-bottom: 20px;
    }

    /* Separador dourado */
    .gold-sep {
      width: 40px; height: 1px; background: #cfb53b;
      margin-bottom: 18px;
    }

    /* Corpo do texto */
    .body-row {
      font-size: 17px; font-weight: 300; line-height: 1.65;
      color: rgba(244,242,235,0.68);
      margin-bottom: 4px;
    }
    .body-row strong {
      font-weight: 600; color: #f4f2eb;
    }

    /* Seta de continuidade */
    .arrow-next {
      display: inline-block; margin-top: 18px;
      font-size: 22px; color: #cfb53b; font-weight: 300;
    }

    /* Slide counter top-right */
    .counter {
      position: absolute; top: 42px; right: 54px;
      font-size: 12px; font-weight: 300; color: rgba(207,181,59,0.70);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="photo-strip">
      <img src="../Fotosparapost/482E0912-34D9-41B4-AE13-E85915167A59.JPG" alt="">
    </div>

    <div class="text-block">
      <p class="slide-num">2 / 5</p>
      <p class="intro-serif">Essa loja em Barcelona</p>
      <h2 class="main-statement">tem centenas de objetos.</h2>
      <div class="gold-sep"></div>
      <p class="body-row">Cada um com história. Cada um com valor.</p>
      <p class="body-row">Mas ninguém sabe o que comprar.</p>
      <p class="body-row">Ninguém sabe onde olhar.</p>
      <p class="body-row"><strong>O excesso anula tudo.</strong></p>
      <span class="arrow-next">→</span>
    </div>

    <div class="counter">1/5</div>
  </div>
</body>
</html>
