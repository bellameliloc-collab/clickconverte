<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,300;1,400;1,700;1,800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1350px; overflow:hidden; background:#1b1c18; }
.cover { width:1080px; height:1350px; position:relative; font-family:'Poppins',sans-serif; overflow:hidden; }
.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center center; }
.overlay { position:absolute; inset:0; background: linear-gradient(165deg,rgba(27,28,24,.15)0%,rgba(27,28,24,.45)42%,rgba(27,28,24,.92)100%), linear-gradient(to right,rgba(50,75,103,.28)0%,rgba(50,75,103,0)55%); }
.content { position:absolute; bottom:0; left:0; right:0; padding:0 64px 72px; }
.tag { display:flex; align-items:center; gap:14px; font-style:italic; font-weight:400; font-size:13px; color:#cfb53b; letter-spacing:3.5px; text-transform:uppercase; margin-bottom:22px; }
.tag::before { content:''; display:block; width:36px; height:1px; background:#cfb53b; flex-shrink:0; }
h1 { font-style:italic; font-weight:700; font-size:68px; line-height:1.12; color:#f4f2eb; text-shadow:0 3px 20px rgba(0,0,0,.6); max-width:900px; margin-bottom:18px; }
.sub { font-style:italic; font-weight:300; font-size:22px; line-height:1.5; color:rgba(244,242,235,.70); text-shadow:0 2px 10px rgba(0,0,0,.5); }
.logo-pill { position:absolute; top:44px; right:54px; background:rgba(244,242,235,.92); backdrop-filter:blur(8px); padding:9px 20px; border-radius:5px; border:1px solid rgba(207,181,59,.35); box-shadow:0 6px 24px rgba(0,0,0,.40),0 2px 8px rgba(0,0,0,.22); }
.logo-pill img { height:24px; display:block; }
.watermark { position:absolute; bottom:-20px; right:-10px; font-family:'Poppins',sans-serif; font-style:italic; font-weight:800; font-size:180px; line-height:1; color:rgba(207,181,59,.07); letter-spacing:-4px; pointer-events:none; user-select:none; white-space:nowrap; }
</style></head><body>
<div class="cover">
  <img class="bg" src="../Fotosparapost/482E0912-34D9-41B4-AE13-E85915167A59.JPG" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div class="tag">Conteúdo</div>
    <h1>Você faz marketing<br>igual a essa loja?</h1>
    <p class="sub">Volume não é estratégia.</p>
  </div>
  <div class="logo-pill"><img src="../public/logo.png" alt="Clickconverte"></div>
  <div class="watermark">CC</div>
</div></body></html>
