<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600;1,700&family=Poppins:ital,wght@0,300;0,600;0,800;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; background: #1d1208; }

    .cover {
      width: 1080px; height: 1350px;
      position: relative; overflow: hidden;
    }

    .bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 30%;
    }

    /* Overlay escuro na base + viés esquerda */
    .overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(175deg,
          rgba(20,13,5,0.02) 0%,
          rgba(20,13,5,0.38) 45%,
          rgba(20,13,5,0.92) 100%),
        linear-gradient(to right,
          rgba(29,18,8,0.35) 0%,
          rgba(29,18,8,0.00) 60%);
    }

    .content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 68px 60px;
    }

    .tag {
      display: flex; align-items: center; gap: 12px;
      font-family: 'Poppins', sans-serif;
      font-weight: 300; font-style: normal;
      font-size: 12px; color: #cfb53b;
      letter-spacing: 4px; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .tag::before {
      content: ''; display: block;
      width: 32px; height: 1px; background: #cfb53b;
    }

    /* Linha 1: Cormorant Garamond italic — editorial/calligráfico */
    .line1 {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 700;
      font-size: 80px; line-height: 1.0;
      color: #f4f2eb;
      text-shadow: 0 4px 24px rgba(0,0,0,0.65);
      margin-bottom: 4px;
    }

    /* Linha 2: Poppins Black italic — impacto, ouro */
    .line2 {
      display: block;
      font-family: 'Poppins', sans-serif;
      font-style: italic; font-weight: 800;
      font-size: 66px; line-height: 1.05;
      color: #cfb53b;
      text-shadow: 0 4px 24px rgba(0,0,0,0.65);
      margin-bottom: 20px;
    }

    .sub {
      font-family: 'Poppins', sans-serif;
      font-style: italic; font-weight: 300;
      font-size: 20px; color: rgba(244,242,235,0.65);
      letter-spacing: 0.5px;
    }

    /* Logo pill editorial */
    .logo-pill {
      position: absolute; top: 42px; right: 54px;
      background: rgba(244,242,235,0.92);
      backdrop-filter: blur(8px);
      padding: 8px 18px; border-radius: 4px;
      border: 1px solid rgba(207,181,59,0.35);
      box-shadow: 0 6px 24px rgba(0,0,0,0.40), 0 2px 8px rgba(0,0,0,0.22);
    }
    .logo-pill img { height: 22px; display: block; }

    /* Watermark CC */
    .watermark {
      position: absolute; bottom: -20px; right: -10px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 700; font-size: 180px;
      line-height: 1; color: rgba(207,181,59,0.06);
      letter-spacing: -6px; pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>
  <div class="cover">
    <img class="bg" src="../Fotosparapost/482E0912-34D9-41B4-AE13-E85915167A59.JPG" alt="">
    <div class="overlay"></div>
    <div class="content">
      <div class="tag">Conteúdo</div>
      <span class="line1">Você faz marketing</span>
      <span class="line2">igual a essa loja?</span>
      <p class="sub">Volume não é estratégia.</p>
    </div>
    <div class="logo-pill">
      <img src="../public/logo.png" alt="Clickconverte">
    </div>
    <div class="watermark">CC</div>
  </div>
</body>
</html>
